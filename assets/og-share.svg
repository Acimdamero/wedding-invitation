<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Wedding Invitation Erzal and Dhea">
  <defs>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2418" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#1a1a18" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="envelope-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0ebe3"/>
      <stop offset="100%" stop-color="#e0d9ce"/>
    </linearGradient>
    <linearGradient id="envelope-flap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8d0c4"/>
      <stop offset="100%" stop-color="#c8c0b4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2c3328" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Muted sage backdrop (source art; JPG uses photo composite) -->
  <rect width="1200" height="630" fill="#2c3328"/>
  <rect width="1200" height="630" fill="url(#overlay)"/>
  <!-- Envelope -->
  <g transform="translate(340 145)" filter="url(#shadow)">
    <polygon points="0,170 260,85 520,170" fill="url(#envelope-flap)"/>
    <rect x="0" y="0" width="520" height="340" rx="4" fill="url(#envelope-body)"/>
    <polygon points="0,340 260,255 520,340" fill="#c0b8ac" opacity="0.85"/>
    <circle cx="10" cy="10" r="3" fill="#c9a962" opacity="0.7"/>
    <circle cx="510" cy="10" r="3" fill="#c9a962" opacity="0.7"/>
    <text x="260" y="118" text-anchor="middle" fill="#6b6b6b" font-family="Jost, system-ui, sans-serif" font-size="18" letter-spacing="3.6">WEDDING INVITATION</text>
    <text x="260" y="178" text-anchor="middle" fill="#2c3328" font-family="'Cormorant Garamond', Georgia, serif" font-size="62">Erzal <tspan fill="#c9a962" font-style="italic">&amp;</tspan> Dhea</text>
    <text x="260" y="228" text-anchor="middle" fill="#8b9a7e" font-family="Jost, system-ui, sans-serif" font-size="22" letter-spacing="1">13 &amp; 22 Juli 2026</text>
  </g>
</svg>
